<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Menu</title>
    <link rel="stylesheet" href="popup.css">
</head>
<body>
    <div id="main">
        <div class="header">
            <button id="settingsBtn" type="button" title="Settings" aria-label="Settings">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
                    <path d="M12 15.5a3.5 3.5 0 1 0 0-7 3.5 3.5 0 0 0 0 7z" stroke="currentColor" stroke-width="2"/>
                    <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09a1.65 1.65 0 0 0-1-1.51 1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09a1.65 1.65 0 0 0 1.51-1 1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33h.09A1.65 1.65 0 0 0 9 3V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51h.09a1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82v.09a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z" stroke="currentColor" stroke-width="2"/>
                </svg>
            </button>
            <h1>Select links to display:</h1>
        </div>
        <div class="container">
            <div class="row">
                <label><input type="checkbox" id="Tracklock">tracklock.gg</label>
                <a class="service-link" href="https://tracklock.gg/" target="_blank" title="Open Tracklock" aria-label="Open Tracklock"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M14 5h5v5M19 5l-8 8" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><path d="M18 13v5a1 1 0 0 1-1 1H6a1 1 0 0 1-1-1V7a1 1 0 0 1 1-1h5" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></a>
            </div>
            <div class="row">
                <label><input type="checkbox" id="Deadlocktracker">deadlocktracker.gg</label>
                <a class="service-link" href="https://deadlocktracker.gg/" target="_blank" title="Open Deadlock Tracker" aria-label="Open Deadlock Tracker"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M14 5h5v5M19 5l-8 8" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><path d="M18 13v5a1 1 0 0 1-1 1H6a1 1 0 0 1-1-1V7a1 1 0 0 1 1-1h5" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></a>
            </div>
            <div class="row">
                <label><input type="checkbox" id="Statlocker">statlocker.gg</label>
                <a class="service-link" href="https://statlocker.gg/" target="_blank" title="Open Statlocker" aria-label="Open Statlocker"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M14 5h5v5M19 5l-8 8" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><path d="M18 13v5a1 1 0 0 1-1 1H6a1 1 0 0 1-1-1V7a1 1 0 0 1 1-1h5" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></a>
            </div>
            <div class="row">
                <label><input type="checkbox" id="Mobalytics">mobalytics.gg</label>
                <a class="service-link" href="https://mobalytics.gg/" target="_blank" title="Open Mobalytics" aria-label="Open Mobalytics"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M14 5h5v5M19 5l-8 8" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><path d="M18 13v5a1 1 0 0 1-1 1H6a1 1 0 0 1-1-1V7a1 1 0 0 1 1-1h5" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></a>
            </div>
        </div>
    </div>

    <div id="settings">
        <div class="settings-header">
            <button id="backSettingsBtn" title="Back" aria-label="Back">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                    <path d="M15 18l-6-6 6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </button>
            <h2>Settings</h2>
            <span></span>
        </div>

        <section class="settings-block">
            <strong class="settings-block-title">About</strong>
            <div class="settings-links">
                <button id="githubBtn" class="link-card" title="GitHub">
                    <span class="link-icon github-icon" aria-hidden="true"></span>
                    <span><strong>GitHub</strong></span>
                </button>
                <button id="emailBtn" class="link-card" title="Contact">
                    <span class="link-icon mail-icon" aria-hidden="true"></span>
                    <span><strong>Contact</strong><small>turbozver24@gmail.com</small></span>
                </button>
            </div>
            <div class="settings-micro-grid">
                <div class="settings-micro-card settings-rate-card">
                    <span>Rate extension</span>
                    <div id="rateBlock"></div>
                </div>
                <div class="settings-micro-card settings-made-card">
                    <span>Made w/ <b aria-label="love">&#10084;</b></span>
                    <strong>by turbozver</strong>
                </div>
            </div>
        </section>

        <div class="upgrade-block">
            <div class="upgrade-title">Need custom links?</div>
            <div class="upgrade-text"><a href="https://chromewebstore.google.com/detail/steam-stats-links/ojmmcmoegpnmepjokkdemcgiklaldcld" target="_blank">SteamStatsLinks</a> supports custom links, ordering, colors, and presets.</div>
            <button id="steamStatsLinksBtn">Open Steam Stats Links</button>
        </div>

    </div>

    <script src="popup.js"></script>
</body>
</html>
