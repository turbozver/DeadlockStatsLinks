<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Menu</title>
    <link rel="stylesheet" href="popup.css">
</head>
<body>
    <div id="main">
        <div class="header">
            <button id="settingsBtn" title="Settings">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
                    <path d="M12 15.5a3.5 3.5 0 1 0 0-7 3.5 3.5 0 0 0 0 7z" stroke="#7ecbff" stroke-width="2"/>
                    <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09a1.65 1.65 0 0 0-1-1.51 1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09a1.65 1.65 0 0 0 1.51-1 1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33h.09A1.65 1.65 0 0 0 9 3V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51h.09a1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82v.09a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z" stroke="#7ecbff" stroke-width="2"/>
                </svg>
            </button>
            <h1>Select links to display:</h1>
        </div>
        <div class="container">
            <div class="row">
                <label><input type="checkbox" id="Tracklock">tracklock.gg</label>
                <a href="https://tracklock.gg/" target="_blank">[link]</a>
            </div>
            <div class="row">
                <label><input type="checkbox" id="Deadlocktracker">deadlocktracker.gg</label>
                <a href="https://deadlocktracker.gg/" target="_blank">[link]</a>
            </div>
            <div class="row">
                <label><input type="checkbox" id="Statlocker">statlocker.gg</label>
                <a href="https://statlocker.gg/" target="_blank">[link]</a>
            </div>
            <div class="row">
                <label><input type="checkbox" id="Mobalytics">mobalytics.gg</label>
                <a href="https://mobalytics.gg/" target="_blank">[link]</a>
            </div>
        </div>
    </div>

    <div id="settings">
        <button id="backSettingsBtn" title="Back">
            <svg width="22" height="24" viewBox="0 0 24 24" fill="none">
                <path d="M10 19l-7-7 7-7" stroke="#7ecbff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M3 12h13a6 6 0 1 1 0 12" stroke="#7ecbff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
        </button>

        <div class="settings-links">
            <button id="githubBtn" title="GitHub">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none">
                    <path d="M12 2C6.48 2 2 6.58 2 12.26c0 4.51 2.87 8.34 6.84 9.7.5.09.68-.22.68-.48 0-.24-.01-.87-.01-1.7-2.78.62-3.37-1.36-3.37-1.36-.45-1.17-1.1-1.48-1.1-1.48-.9-.63.07-.62.07-.62 1 .07 1.53 1.05 1.53 1.05.89 1.56 2.34 1.11 2.91.85.09-.66.35-1.11.63-1.37-2.22-.26-4.56-1.14-4.56-5.08 0-1.12.39-2.03 1.03-2.75-.1-.26-.45-1.3.1-2.7 0 0 .84-.28 2.75 1.05a9.38 9.38 0 0 1 2.5-.34c.85 0 1.71.11 2.5.34 1.91-1.33 2.75-1.05 2.75-1.05.55 1.4.2 2.44.1 2.7.64.72 1.03 1.63 1.03 2.75 0 3.95-2.34 4.82-4.57 5.08.36.32.68.94.68 1.9 0 1.37-.01 2.47-.01 2.8 0 .26.18.57.69.48A10.01 10.01 0 0 0 22 12.26C22 6.58 17.52 2 12 2Z" fill="#7ecbff"/>
                </svg>
            </button>
            <button id="emailBtn" title="Email">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none">
                    <rect x="2" y="6" width="20" height="12" rx="2" stroke="#7ecbff" stroke-width="2"/>
                    <path d="M22 6l-10 7L2 6" stroke="#7ecbff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </button>
        </div>

        <div id="rateBlock"></div>

        <div class="upgrade-block">
            <div class="upgrade-title">Need custom links?</div>
            <div class="upgrade-text"><a href="https://chromewebstore.google.com/detail/steam-stats-links/ojmmcmoegpnmepjokkdemcgiklaldcld" target="_blank">SteamStatsLinks</a> supports custom links, ordering, colors, and presets.</div>
            <button id="steamStatsLinksBtn">Open Steam Stats Links</button>
        </div>

        <div class="made-by">Made w/ <span>&#10084;</span> by turbozver</div>
    </div>

    <script src="popup.js"></script>
</body>
</html>
